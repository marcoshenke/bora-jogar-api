default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: bora_jogar_api_development

test:
  <<: *default
  database: bora_jogar_api_test

production:
  <<: *default
  database: bora_jogar_api_production
  username: bora_jogar_api
  password: <%= ENV["BORA_JOGAR_API_DATABASE_PASSWORD"] %>